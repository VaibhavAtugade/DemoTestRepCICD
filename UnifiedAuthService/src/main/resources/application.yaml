spring:
  application:
    name: UNIFIED-AUTH-SERVICE

  datasource:
    url: jdbc:oracle:thin:@172.20.21.12:1522/upgrade
    username: FOSPREPROD
    password: FOSPREPROD
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: update # Or 'create', 'create-drop', 'none' depending on your needs
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

server:
  port: 8083
  servlet:
    context-path: /

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
